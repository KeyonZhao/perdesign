<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品物产品信息征询表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
        }
        
        .section {
            margin-bottom: 32px;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .field {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }
        
        input[type="text"], textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            color: #fff;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #fff;
        }
        
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .radio-option:hover {
            border-color: #666;
        }
        
        .radio-option.selected {
            border-color: #fff;
            background: #2a2a2a;
        }
        
        .radio-option input {
            display: none;
        }
        
        .radio-circle {
            width: 18px;
            height: 18px;
            border: 2px solid #666;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .radio-option.selected .radio-circle {
            border-color: #fff;
        }
        
        .radio-option.selected .radio-circle::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
        }
        
        .radio-label {
            font-size: 14px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        
        .submit-btn:hover {
            opacity: 0.9;
        }
        
        .submit-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 16px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            line-height: 1.5;
        }
        
        .status.success {
            display: block;
            background: #1a3d1a;
            color: #4ade80;
        }
        
        .status.error {
            display: block;
            background: #3d1a1a;
            color: #f87171;
        }
        
        .result-box {
            margin-top: 12px;
            padding: 12px;
            background: #111;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        
        .result-box.show {
            display: block;
        }
    </style>
</head>

dg/+n5vTph383w2WJcGGAmaLSDWvh1HfDvZvcZWCkZp79NHrOYb3w7YHzFrnWaLPgTWNttOit9hy78HToB/I5Rnulrlqxj9gmSVYDcpjg54g/4A86nlw/n9+BHfgX2DlnQAAAABJRU5ErkJggg==" alt="品物Logo" style="max-width: 150px; margin-bottom: 20px; display: block;">
<h1>品物产品信息征询表</h1>
        <p class="subtitle">请填写项目基本信息</p>
        
        <form id="projectForm">
            <!-- 产品维度 -->
            <div class="section">
                <div class="section-title">产品维度</div>
                
                <div class="field">
                    <label>产品名称 *</label>
                    <input type="text" name="productName" required placeholder="输入客户产品名称">
                </div>
                
                <div class="field">
                    <label>客户需求 *</label>
                    <textarea name="clientNeeds" required placeholder="客户提出的具体需求"></textarea>
                </div>
                
                <div class="field">
                    <label>产品功能描述 *</label>
                    <textarea name="productDescription" required placeholder="描述产品的核心功能和用途"></textarea>
                </div>
                
                <div class="field">
                    <label>产品期望风格 *</label>
                    <input type="text" name="designStyle" required placeholder="例如：科技极简、户外运动">
                </div>
                
                <div class="field">
                    <label>竞品品牌 *</label>
                    <input type="text" name="competitors" required placeholder="列出主要竞品品牌">
                </div>
                
                <div class="field">
                    <label>竞品优势 *</label>
                    <textarea name="competitorAdvantage" required placeholder="分析竞品的优势所在"></textarea>
                </div>
            </div>
            
            <!-- 用户分析 -->
            <div class="section">
                <div class="section-title">用户分析</div>
                
                <div class="field">
                    <label>目标用户群体 *</label>
                    <input type="text" name="targetUsers" required placeholder="输入产品目标用户群体">
                </div>
                
                <div class="field">
                    <label>用户痛点 *</label>
                    <textarea name="userNeeds" required placeholder="描述目标用户的核心需求"></textarea>
                </div>
            </div>
            
            <!-- 营销信息 -->
            <div class="section">
                <div class="section-title">营销信息</div>
                
                <div class="field">
                    <label>市场定位 *</label>
                    <input type="text" name="marketPosition" required placeholder="例如：公牛=安全插座、小罐茶=高端茶、戴森=专业吸尘器、海飞丝=去屑">
                </div>
            </div>
            
            <!-- 企业信息 -->
            <div class="section">
                <div class="section-title">企业信息</div>
                
                <div class="field">
                    <label>企业名称 *</label>
                    <input type="text" name="companyName" required placeholder="输入客户企业名称">
                </div>
                
                <div class="field">
                    <label>公司使命/愿景/核心价值观 *</label>
                    <textarea name="companyVision" required placeholder="描述企业的使命、愿景和核心价值观"></textarea>
                </div>
                
                <div class="field">
                    <label>企业所属行业 *</label>
                    <input type="text" name="industry" required placeholder="例如：智能硬件、消费电子">
                </div>
            </div>
            
            <!-- 项目目标 -->
            <div class="section">
                <div class="section-title">项目目标（单选）*</div>
                
                <div class="radio-group" id="projectGoals">
                    <label class="radio-option" data-value="unique_value">
                        <input type="radio" name="projectGoal" value="打造独特价值主张的创新产品" required>
                        <span class="radio-circle"></span>
                        <span class="radio-label">打造独特价值主张的创新产品</span>
                    </label>
                    
                    <label class="radio-option" data-value="hit_product">
                        <input type="radio" name="projectGoal" value="打造「爆品级」创新形态" required>
                        <span class="radio-circle"></span>
                        <span class="radio-label">打造"爆品级"创新形态</span>
                    </label>
                    
                    <label class="radio-option" data-value="differentiation">
                        <input type="radio" name="projectGoal" value="提供差异化解决方案">
                        <span class="radio-circle"></span>
                        <span class="radio-label">提供差异化解决方案</span>
                    </label>
                    
                    <label class="radio-option" data-value="emotion">
                        <input type="radio" name="projectGoal" value="建立产品情感/价值连接">
                        <span class="radio-circle"></span>
                        <span class="radio-label">建立产品情感/价值连接</span>
                    </label>
                    
                    <label class="radio-option" data-value="rethink">
                        <input type="radio" name="projectGoal" value="重塑产品认知路径">
                        <span class="radio-circle"></span>
                        <span class="radio-label">重塑产品认知路径</span>
                    </label>
                </div>
            </div>
            
            <button type="submit" class="submit-btn">提交项目信息</button>
            
            <div class="status" id="status"></div>
            <div class="result-box" id="resultBox"></div>
        </form>
    </div>
    
    <script>
        // 单选交互
        const radioOptions = document.querySelectorAll('.radio-option');
        radioOptions.forEach(option => {
            option.addEventListener('click', () => {
                radioOptions.forEach(o => o.classList.remove('selected'));
                option.classList.add('selected');
            });
        });
        
        // 提交表单
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            
            // 验证项目目标是否选择
            const projectGoal = formData.get('projectGoal');
            if (!projectGoal) {
                showStatus('请选择项目目标', 'error');
                return;
            }
            
            // 获取所有字段值（直接从input/textarea获取，确保完整）
            const data = {
                clientNeeds: document.querySelector('[name="clientNeeds"]').value,
                productName: document.querySelector('[name="productName"]').value,
                productDescription: document.querySelector('[name="productDescription"]').value,
                designStyle: document.querySelector('[name="designStyle"]').value,
                competitors: document.querySelector('[name="competitors"]').value,
                competitorAdvantage: document.querySelector('[name="competitorAdvantage"]').value,
                targetUsers: document.querySelector('[name="targetUsers"]').value,
                userNeeds: document.querySelector('[name="userNeeds"]').value,
                marketPosition: document.querySelector('[name="marketPosition"]').value,
                companyName: document.querySelector('[name="companyName"]').value,
                companyVision: document.querySelector('[name="companyVision"]').value,
                industry: document.querySelector('[name="industry"]').value,
                projectGoal: projectGoal
            };
            
            // 验证必填字段
            for (const [key, value] of Object.entries(data)) {
                if (!value || value.trim() === '') {
                    showStatus(`请填写所有必填字段: ${key}`, 'error');
                    return;
                }
            }
            
            // 调试：显示实际获取到的字段数量
            console.log('获取到字段数:', Object.keys(data).length);
            console.log('projectGoal值:', data.projectGoal);
            
            // 格式化输出
            const output = formatOutput(data);
            
            // 复制到剪贴板
            try {
                await navigator.clipboard.writeText(output);
                showStatus('✅ 已复制到剪贴板！请直接发送给我～', 'success');
                showResult(output);
            } catch {
                showResult(output);
                showStatus('请复制上方信息发送给我', 'success');
            }
        });
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
        
        function showResult(text) {
            const resultBox = document.getElementById('resultBox');
            resultBox.textContent = text;
            resultBox.classList.add('show');
        }
        
        function formatOutput(data) {
            // 确保projectGoal有值
            const goalText = data.projectGoal || '未选择项目目标';
            
            return `【项目信息提交】

产品维度
- 客户需求：${data.clientNeeds}
- 产品名称：${data.productName}
- 产品功能描述：${data.productDescription}
- 产品期望风格：${data.designStyle}

竞品分析
- 竞品品牌：${data.competitors}
- 竞品优势：${data.competitorAdvantage}

用户分析
- 目标用户群体：${data.targetUsers}
- 用户痛点：${data.userNeeds}

营销信息
- 市场定位：${data.marketPosition}

企业信息
- 企业名称：${data.companyName}
- 公司使命/愿景/核心价值观：${data.companyVision}
- 企业所属行业：${data.industry}

项目目标
- ${goalText}`;
        }
    </script>
</body>
</html>
